<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="100%">
  <defs>
    <!-- Cabinet Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060f"/>
      <stop offset="100%" stop-color="#080c1f"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1326"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Neon Glow Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="laserGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Arcade Screen Background -->
  <rect width="860" height="280" rx="16" fill="url(#bgGrad)" stroke="#1e2d5c" stroke-width="1.5"/>
  
  <!-- Outer Cabinet Pulsing Neon Frame -->
  <rect width="860" height="280" rx="16" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#4f46e5;#00f0ff;#a855f7;#ff007f;#4f46e5" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- ================= BACKGROUND STARFIELD (Moving space effect) ================= -->
  <g fill="#ffffff" opacity="0.3">
    <!-- Star Group 1 (Slow) -->
    <g>
      <circle cx="100" cy="80" r="1"/>
      <circle cx="300" cy="210" r="1"/>
      <circle cx="550" cy="90" r="1.2"/>
      <circle cx="780" cy="180" r="0.8"/>
      <circle cx="420" cy="140" r="1"/>
      <circle cx="210" cy="50" r="1"/>
      <circle cx="680" cy="220" r="1"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-860 0" dur="40s" repeatCount="indefinite"/>
    </g>
    <!-- Star Group 2 (Duplicate for seamless loop) -->
    <g transform="translate(860, 0)">
      <circle cx="100" cy="80" r="1"/>
      <circle cx="300" cy="210" r="1"/>
      <circle cx="550" cy="90" r="1.2"/>
      <circle cx="780" cy="180" r="0.8"/>
      <circle cx="420" cy="140" r="1"/>
      <circle cx="210" cy="50" r="1"/>
      <circle cx="680" cy="220" r="1"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-860 0" dur="40s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ================= RETRO GRID (Perspective Floor Lines) ================= -->
  <g stroke="#1a2440" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="240" x2="860" y2="240"/>
    <line x1="0" y1="250" x2="860" y2="250"/>
    <line x1="0" y1="262" x2="860" y2="262"/>
    <!-- Perspective vertical lines -->
    <line x1="430" y1="230" x2="430" y2="280"/>
    <line x1="430" y1="230" x2="200" y2="280"/>
    <line x1="430" y1="230" x2="660" y2="280"/>
    <line x1="430" y1="230" x2="-30" y2="280"/>
    <line x1="430" y1="230" x2="890" y2="280"/>
  </g>

  <!-- ================= ARCADE CABINET TOP HUD ================= -->
  <g font-family="'Courier New',Courier,monospace" font-weight="bold">
    <text x="30" y="32" font-size="11" fill="#00f0ff" letter-spacing="2">// CHOOSE_MISSION (REPOS)</text>
    
    <!-- Player Stats -->
    <text x="500" y="31" font-size="9" fill="#ff007f" text-anchor="end">1P: Manu</text>
    <text x="650" y="31" font-size="9" fill="#fbbf24" text-anchor="end">SCORE: 9400</text>
    <text x="830" y="31" font-size="9" fill="#22c55e" text-anchor="end">HI-SCORE: 99990</text>
  </g>
  <line x1="30" y1="38" x2="830" y2="38" stroke="#1e2d5c" stroke-width="1"/>

  <!-- ================= CAROUSEL AREA (Endless Conveyor Belt) ================= -->
  <!-- Card dimensions: width=250, height=135, gap=30. Total offset interval = 280px -->
  <g>
    <!-- The translation slides the whole container left by exactly 280px (1 card width + gap) then wraps around -->
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-280 0" dur="8s" repeatCount="indefinite" additive="sum"/>
    
    <!-- Card 1: discord-security-bot -->
    <g transform="translate(20, 55)">
      <rect width="250" height="135" rx="8" fill="url(#cardBg)" stroke="#00f0ff" stroke-width="1.2" filter="url(#neonGlow)"/>
      <text x="20" y="30" font-family="Arial,sans-serif" font-size="20">🤖</text>
      <text x="52" y="27" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#00f0ff">discord-security-bot</text>
      <line x1="20" y1="42" x2="230" y2="42" stroke="#1c2742" stroke-width="1"/>
      <text x="20" y="62" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">DDoS webhook alert piping,</text>
      <text x="20" y="78" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">role syncing, and moderation</text>
      <text x="20" y="94" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">workflows engine.</text>
      <rect x="20" y="108" width="58" height="15" rx="3" fill="#082f49"/>
      <text x="49" y="119" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#38bdf8" font-weight="bold">NodeJS</text>
      <text x="230" y="120" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#64748b" text-anchor="end">★ PRIVATE</text>
    </g>

    <!-- Card 2: samp-rp-gamemode -->
    <g transform="translate(300, 55)">
      <rect width="250" height="135" rx="8" fill="url(#cardBg)" stroke="#a855f7" stroke-width="1.2" filter="url(#neonGlow)"/>
      <text x="20" y="30" font-family="Arial,sans-serif" font-size="20">🎮</text>
      <text x="52" y="27" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#a855f7">samp-rp-gamemode</text>
      <line x1="20" y1="42" x2="230" y2="42" stroke="#1c2742" stroke-width="1"/>
      <text x="20" y="62" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">Roleplay gamemode scripting,</text>
      <text x="20" y="78" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">MySQL query optimizations,</text>
      <text x="20" y="94" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">and modular Pawn setups.</text>
      <rect x="20" y="108" width="50" height="15" rx="3" fill="#3b0764"/>
      <text x="45" y="119" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#c084fc" font-weight="bold">Pawn</text>
      <text x="230" y="120" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#64748b" text-anchor="end">★ PRIVATE</text>
    </g>

    <!-- Card 3: ddos-alert-system -->
    <g transform="translate(580, 55)">
      <rect width="250" height="135" rx="8" fill="url(#cardBg)" stroke="#ff007f" stroke-width="1.2" filter="url(#neonGlow)"/>
      <text x="20" y="30" font-family="Arial,sans-serif" font-size="20">🛡️</text>
      <text x="52" y="27" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#ff007f">ddos-alert-system</text>
      <line x1="20" y1="42" x2="230" y2="42" stroke="#1c2742" stroke-width="1"/>
      <text x="20" y="62" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">Real-time bash network logs</text>
      <text x="20" y="78" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">monitoring and automatic</text>
      <text x="20" y="94" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">webhook alerts trigger.</text>
      <rect x="20" y="108" width="50" height="15" rx="3" fill="#4c0519"/>
      <text x="45" y="119" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#fda4af" font-weight="bold">Bash</text>
      <text x="230" y="120" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#64748b" text-anchor="end">★ PRIVATE</text>
    </g>

    <!-- Card 4: MazhaV1 -->
    <g transform="translate(860, 55)">
      <rect width="250" height="135" rx="8" fill="url(#cardBg)" stroke="#22c55e" stroke-width="1.2" filter="url(#neonGlow)"/>
      <text x="20" y="30" font-family="Arial,sans-serif" font-size="20">🌧️</text>
      <text x="52" y="27" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#22c55e">MazhaV1</text>
      <line x1="20" y1="42" x2="230" y2="42" stroke="#1c2742" stroke-width="1"/>
      <text x="20" y="62" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">Kerala regional game script,</text>
      <text x="20" y="78" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">featuring rain graphics and</text>
      <text x="20" y="94" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">localized database assets.</text>
      <rect x="20" y="108" width="80" height="15" rx="3" fill="#064e3b"/>
      <text x="60" y="119" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#6ee7b7" font-weight="bold">Pawn/MySQL</text>
      <text x="230" y="120" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#64748b" text-anchor="end">★ PRIVATE</text>
    </g>

    <!-- Card 5: dmzrider (Profile) -->
    <g transform="translate(1140, 55)">
      <rect width="250" height="135" rx="8" fill="url(#cardBg)" stroke="#fbbf24" stroke-width="1.2" filter="url(#neonGlow)"/>
      <text x="20" y="30" font-family="Arial,sans-serif" font-size="20">🌏</text>
      <text x="52" y="27" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#fbbf24">dmzrider</text>
      <line x1="20" y1="42" x2="230" y2="42" stroke="#1c2742" stroke-width="1"/>
      <text x="20" y="62" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">Core portfolio configuration,</text>
      <text x="20" y="78" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">animated SVG dashboards,</text>
      <text x="20" y="94" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">and automation actions.</text>
      <rect x="20" y="108" width="65" height="15" rx="3" fill="#78350f"/>
      <text x="52" y="119" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#fcd34d" font-weight="bold">Markdown</text>
      <text x="230" y="120" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#64748b" text-anchor="end">★ PUBLIC</text>
    </g>

    <!-- Card 6: Duplicate of Card 1 for seamless wrap (x = 1140 + 280 = 1420) -->
    <g transform="translate(1420, 55)">
      <rect width="250" height="135" rx="8" fill="url(#cardBg)" stroke="#00f0ff" stroke-width="1.2" filter="url(#neonGlow)"/>
      <text x="20" y="30" font-family="Arial,sans-serif" font-size="20">🤖</text>
      <text x="52" y="27" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#00f0ff">discord-security-bot</text>
      <line x1="20" y1="42" x2="230" y2="42" stroke="#1c2742" stroke-width="1"/>
      <text x="20" y="62" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">DDoS webhook alert piping,</text>
      <text x="20" y="78" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">role syncing, and moderation</text>
      <text x="20" y="94" font-family="Arial,sans-serif" font-size="10.5" fill="#94a3b8">workflows engine.</text>
      <rect x="20" y="108" width="58" height="15" rx="3" fill="#082f49"/>
      <text x="49" y="119" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#38bdf8" font-weight="bold">NodeJS</text>
      <text x="230" y="120" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#64748b" text-anchor="end">★ PRIVATE</text>
    </g>
  </g>

  <!-- ================= CONSOLE HUD / SCANNER OVERLAYS ================= -->
  <!-- Target Reticle Overlay -->
  <g stroke="#ff007f" stroke-width="1" fill="none" opacity="0.6">
    <circle cx="430" cy="122" r="14"/>
    <line x1="410" y1="122" x2="450" y2="122"/>
    <line x1="430" y1="102" x2="430" y2="142"/>
    <!-- Corner brackets -->
    <path d="M 400 90 L 400 75 L 415 75"/>
    <path d="M 460 90 L 460 75 L 445 75"/>
    <path d="M 400 155 L 400 170 L 415 170"/>
    <path d="M 460 155 L 460 170 L 445 170"/>
  </g>

  <!-- Scanning Sweep Laser (Vertical Line sweep) -->
  <line x1="60" y1="45" x2="60" y2="200" stroke="#00f0ff" stroke-width="2" opacity="0.7" filter="url(#laserGlow)">
    <animate attributeName="x1" values="60;800;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="60;800;60" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- ================= PLAYABLE PLAYER CHARACTER (DMZRIDER SHIP) ================= -->
  <!-- Spaceship positioned on the grid floor, floating left/right slightly -->
  <g transform="translate(430, 238)">
    <animateTransform attributeName="transform" type="translate" from="390 238" to="470 238" dur="3s" repeatCount="indefinite" autoReverse="true"/>
    
    <!-- Laser beams fired upward from ship wings -->
    <line x1="-12" y1="-8" x2="-12" y2="-180" stroke="url(#laserGrad)" stroke-width="1.8" filter="url(#laserGlow)">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="-8" x2="12" y2="-180" stroke="url(#laserGrad)" stroke-width="1.8" filter="url(#laserGlow)">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="0.4s" repeatCount="indefinite"/>
    </line>

    <!-- Jet exhaust glow -->
    <polygon points="-5,10 0,22 5,10" fill="#ff007f" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.1s" repeatCount="indefinite"/>
    </polygon>

    <!-- Space Fighter Body -->
    <!-- Wings -->
    <polygon points="-20,8 -5,-2 5,-2 20,8 12,-4 -12,-4" fill="#1e1b4b" stroke="#a855f7" stroke-width="1"/>
    <!-- Wing tips (neon cyan) -->
    <polygon points="-22,8 -20,2 -16,4" fill="#00f0ff" filter="url(#neonGlow)"/>
    <polygon points="22,8 20,2 16,4" fill="#00f0ff" filter="url(#neonGlow)"/>
    <!-- Fuselage -->
    <polygon points="0,-12 -6,2 6,2" fill="#0c0f24" stroke="#00f0ff" stroke-width="1.2" filter="url(#neonGlow)"/>
    <!-- Cockpit canopy -->
    <ellipse cx="0" cy="-2" rx="3" ry="5" fill="#ff007f" filter="url(#neonGlow)"/>
  </g>

  <!-- Interactive Terminal Frame Overlays -->
  <rect x="15" y="15" width="830" height="250" fill="none" stroke="#1e2d5c" stroke-width="1" opacity="0.3"/>

</svg>
