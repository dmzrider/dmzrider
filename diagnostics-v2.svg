<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 195" width="100%">
  <defs>
    <linearGradient id="dbbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="barG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/><stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="metricG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="860" height="195" rx="14" fill="url(#dbbg)" stroke="#1a2540" stroke-width="1.2"/>
  <rect width="860" height="195" rx="14" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Split Divider -->
  <line x1="430" y1="15" x2="430" y2="180" stroke="#1e2d52" stroke-dasharray="3 3"/>

  <!-- ================= LEFT PANEL: PRODUCTIVE TIME ================= -->
  <text x="30" y="32" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#00f0ff" letter-spacing="1.5">🌅 PRODUCTIVE TIME (IST)</text>
  
  <!-- Morning -->
  <g transform="translate(30, 48)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">🌅 Morning</text>
    <text x="100" y="12" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b">(06h - 12h)</text>
    <rect x="170" y="3" width="160" height="9" rx="4.5" fill="#161b22"/>
    <rect x="170" y="3" width="0" height="9" rx="4.5" fill="url(#barG)">
      <animate attributeName="width" values="0;0;0" dur="1.2s" fill="freeze" begin="0.2s"/>
    </rect>
    <text x="345" y="12" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00f0ff" font-weight="bold">0%</text>
  </g>

  <!-- Daytime -->
  <g transform="translate(30, 80)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">☀️ Daytime</text>
    <text x="100" y="12" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b">(12h - 18h)</text>
    <rect x="170" y="3" width="160" height="9" rx="4.5" fill="#161b22"/>
    <rect x="170" y="3" width="0" height="9" rx="4.5" fill="url(#barG)">
      <animate attributeName="width" values="0;62;62" dur="1.2s" fill="freeze" begin="0.4s"/>
    </rect>
    <text x="345" y="12" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00f0ff" font-weight="bold">39%</text>
  </g>

  <!-- Evening -->
  <g transform="translate(30, 112)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">🌆 Evening</text>
    <text x="100" y="12" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b">(18h - 24h)</text>
    <rect x="170" y="3" width="160" height="9" rx="4.5" fill="#161b22"/>
    <rect x="170" y="3" width="0" height="9" rx="4.5" fill="url(#barG)">
      <animate attributeName="width" values="0;97;97" dur="1.2s" fill="freeze" begin="0.6s"/>
    </rect>
    <text x="345" y="12" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00f0ff" font-weight="bold">61%</text>
  </g>

  <!-- Night -->
  <g transform="translate(30, 144)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">🌃 Night</text>
    <text x="100" y="12" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b">(00h - 06h)</text>
    <rect x="170" y="3" width="160" height="9" rx="4.5" fill="#161b22"/>
    <rect x="170" y="3" width="0" height="9" rx="4.5" fill="url(#barG)">
      <animate attributeName="width" values="0;0;0" dur="1.2s" fill="freeze" begin="0.8s"/>
    </rect>
    <text x="345" y="12" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00f0ff" font-weight="bold">0%</text>
  </g>

  <!-- ================= RIGHT PANEL: PROFILE METRICS SUMMARY ================= -->
  <text x="460" y="32" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold" fill="#a855f7" letter-spacing="1.5">📊 PROFILE DIAGNOSTICS</text>

  <!-- Grid of stats -->
  <!-- Commits -->
  <g transform="translate(460, 48)">
    <rect width="110" height="54" rx="8" fill="url(#metricG)" stroke="#312e81" stroke-width="1"/>
    <text x="55" y="24" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00f0ff" text-anchor="middle">37</text>
    <text x="55" y="42" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b" text-anchor="middle">COMMITS</text>
  </g>

  <!-- PRs -->
  <g transform="translate(585, 48)">
    <rect width="110" height="54" rx="8" fill="url(#metricG)" stroke="#312e81" stroke-width="1"/>
    <text x="55" y="24" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#a855f7" text-anchor="middle">0</text>
    <text x="55" y="42" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b" text-anchor="middle">PRs SPLIT</text>
  </g>

  <!-- Issues -->
  <g transform="translate(710, 48)">
    <rect width="110" height="54" rx="8" fill="url(#metricG)" stroke="#312e81" stroke-width="1"/>
    <text x="55" y="24" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#ff007f" text-anchor="middle">0</text>
    <text x="55" y="42" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b" text-anchor="middle">ISSUES SOLVED</text>
  </g>

  <!-- Repos -->
  <g transform="translate(460, 114)">
    <rect width="110" height="54" rx="8" fill="url(#metricG)" stroke="#312e81" stroke-width="1"/>
    <text x="55" y="24" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#fbbf24" text-anchor="middle">3</text>
    <text x="55" y="42" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b" text-anchor="middle">PROJECTS</text>
  </g>

  <!-- Rank -->
  <g transform="translate(585, 114)">
    <rect width="235" height="54" rx="8" fill="url(#metricG)" stroke="#312e81" stroke-width="1"/>
    <text x="117" y="25" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">⭐⭐⭐ Expert Developer</text>
    <text x="117" y="43" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b" text-anchor="middle">CURRENT RANKING</text>
  </g>

</svg>
