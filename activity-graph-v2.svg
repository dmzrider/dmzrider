<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="agbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>

    <!-- Path Line Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>

    <!-- Area Gradient (glowing fill below line) -->
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid Dots Pattern -->
    <pattern id="dotPattern" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#1e2d52" opacity="0.4"/>
    </pattern>

    <!-- Filters for glows -->
    <filter id="agGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pointGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer Card Container -->
  <rect width="860" height="200" rx="14" fill="url(#agbg)" stroke="#1a2540" stroke-width="1.2"/>
  <rect width="860" height="200" rx="14" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#4f46e5;#00f0ff;#a855f7;#ff007f;#4f46e5" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- Header Section -->
  <text x="30" y="32" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="bold" fill="#00f0ff" letter-spacing="2">// DAILY_ACTIVITY_MONITOR (30D)</text>
  <text x="830" y="31" font-family="'Courier New',Courier,monospace" font-size="9" fill="#64748b" text-anchor="end">STATUS: ACTIVE</text>
  <line x1="30" y1="38" x2="830" y2="38" stroke="#1e3a5f" stroke-width="0.8" opacity="0.4"/>

  <!-- Chart Grid Lines -->
  <rect x="50" y="55" width="760" height="100" fill="url(#dotPattern)"/>

  <g stroke="#1e2d52" stroke-width="0.5" opacity="0.4">
    <!-- Horizontal Levels -->
    <line x1="50" y1="55"  x2="810" y2="55"/>
    <text x="42" y="58" font-family="'Courier New',Courier,monospace" font-size="8" fill="#64748b" text-anchor="end">HIGH</text>

    <line x1="50" y1="105" x2="810" y2="105"/>
    <text x="42" y="108" font-family="'Courier New',Courier,monospace" font-size="8" fill="#64748b" text-anchor="end">MED</text>

    <line x1="50" y1="155" x2="810" y2="155"/>
    <text x="42" y="158" font-family="'Courier New',Courier,monospace" font-size="8" fill="#64748b" text-anchor="end">LOW</text>

    <!-- Vertical Time Slots (6 weeks slots) -->
    <line x1="176.6" y1="55" x2="176.6" y2="155"/>
    <line x1="303.2" y1="55" x2="303.2" y2="155"/>
    <line x1="430.0" y1="55" x2="430.0" y2="155"/>
    <line x1="556.6" y1="55" x2="556.6" y2="155"/>
    <line x1="683.2" y1="55" x2="683.2" y2="155"/>
  </g>

  <!-- Baseline -->
  <line x1="50" y1="155" x2="810" y2="155" stroke="#1e2d52" stroke-width="1.2"/>

  <!-- Chart Area Clipping Path -->
  <clipPath id="chartClip">
    <rect x="50" y="50" width="760" height="110"/>
  </clipPath>

  <!-- Dynamic Area Fill -->
  <path d="M 50.0 155.0 C 58.7 155.0, 67.5 155.0, 76.2 155.0 C 84.9 155.0, 93.7 155.0, 102.4 155.0 C 111.1 155.0, 119.9 155.0, 128.6 155.0 C 137.4 155.0, 146.1 155.0, 154.8 155.0 C 163.6 155.0, 172.3 155.0, 181.0 155.0 C 189.8 155.0, 198.5 155.0, 207.2 155.0 C 216.0 155.0, 224.7 155.0, 233.4 155.0 C 242.2 155.0, 250.9 155.0, 259.7 155.0 C 268.4 155.0, 277.1 155.0, 285.9 155.0 C 294.6 155.0, 303.3 155.0, 312.1 155.0 C 320.8 155.0, 329.5 155.0, 338.3 155.0 C 347.0 155.0, 355.7 155.0, 364.5 155.0 C 373.2 155.0, 382.0 155.0, 390.7 155.0 C 399.4 155.0, 408.2 155.0, 416.9 155.0 C 425.6 155.0, 434.4 155.0, 443.1 155.0 C 451.8 155.0, 460.6 155.0, 469.3 155.0 C 478.0 155.0, 486.8 155.0, 495.5 155.0 C 504.3 155.0, 513.0 155.0, 521.7 155.0 C 530.5 155.0, 539.2 155.0, 547.9 155.0 C 556.7 155.0, 565.4 160.0, 574.1 155.0 C 582.9 147.9, 591.6 120.8, 600.3 112.5 C 609.1 104.2, 617.8 103.1, 626.6 105.4 C 635.3 107.8, 644.0 118.4, 652.8 126.7 C 661.5 134.9, 670.2 150.3, 679.0 155.0 C 687.7 159.7, 696.4 155.0, 705.2 155.0 C 713.9 155.0, 722.6 160.0, 731.4 155.0 C 740.1 140.8, 748.9 77.1, 757.6 70.0 C 766.3 62.9, 775.1 100.7, 783.8 112.5 C 792.5 124.3, 801.3 136.1, 810.0 140.8 L 810,155 L 50,155 Z" fill="url(#areaGrad)" clip-path="url(#chartClip)"/>

  <!-- Dynamic Activity Wave (Cubic Spline Path) -->
  <path d="M 50.0 155.0 C 58.7 155.0, 67.5 155.0, 76.2 155.0 C 84.9 155.0, 93.7 155.0, 102.4 155.0 C 111.1 155.0, 119.9 155.0, 128.6 155.0 C 137.4 155.0, 146.1 155.0, 154.8 155.0 C 163.6 155.0, 172.3 155.0, 181.0 155.0 C 189.8 155.0, 198.5 155.0, 207.2 155.0 C 216.0 155.0, 224.7 155.0, 233.4 155.0 C 242.2 155.0, 250.9 155.0, 259.7 155.0 C 268.4 155.0, 277.1 155.0, 285.9 155.0 C 294.6 155.0, 303.3 155.0, 312.1 155.0 C 320.8 155.0, 329.5 155.0, 338.3 155.0 C 347.0 155.0, 355.7 155.0, 364.5 155.0 C 373.2 155.0, 382.0 155.0, 390.7 155.0 C 399.4 155.0, 408.2 155.0, 416.9 155.0 C 425.6 155.0, 434.4 155.0, 443.1 155.0 C 451.8 155.0, 460.6 155.0, 469.3 155.0 C 478.0 155.0, 486.8 155.0, 495.5 155.0 C 504.3 155.0, 513.0 155.0, 521.7 155.0 C 530.5 155.0, 539.2 155.0, 547.9 155.0 C 556.7 155.0, 565.4 160.0, 574.1 155.0 C 582.9 147.9, 591.6 120.8, 600.3 112.5 C 609.1 104.2, 617.8 103.1, 626.6 105.4 C 635.3 107.8, 644.0 118.4, 652.8 126.7 C 661.5 134.9, 670.2 150.3, 679.0 155.0 C 687.7 159.7, 696.4 155.0, 705.2 155.0 C 713.9 155.0, 722.6 160.0, 731.4 155.0 C 740.1 140.8, 748.9 77.1, 757.6 70.0 C 766.3 62.9, 775.1 100.7, 783.8 112.5 C 792.5 124.3, 801.3 136.1, 810.0 140.8" fill="none" stroke="url(#lineGrad)" stroke-width="3" filter="url(#agGlow)" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#chartClip)">
    <animate attributeName="stroke-dasharray" values="0,2000;2000,0" dur="2s" fill="freeze"/>
  </path>

  <!-- Dynamic Trendline (Moving Average / Dotted) -->
  <path d="M 50.0 155.0 C 58.7 155.0, 67.5 155.0, 76.2 155.0 C 84.9 155.0, 93.7 155.0, 102.4 155.0 C 111.1 155.0, 119.9 155.0, 128.6 155.0 C 137.4 155.0, 146.1 155.0, 154.8 155.0 C 163.6 155.0, 172.3 155.0, 181.0 155.0 C 189.8 155.0, 198.5 155.0, 207.2 155.0 C 216.0 155.0, 224.7 155.0, 233.4 155.0 C 242.2 155.0, 250.9 155.0, 259.7 155.0 C 268.4 155.0, 277.1 155.0, 285.9 155.0 C 294.6 155.0, 303.3 155.0, 312.1 155.0 C 320.8 155.0, 329.5 155.0, 338.3 155.0 C 347.0 155.0, 355.7 155.0, 364.5 155.0 C 373.2 155.0, 382.0 155.0, 390.7 155.0 C 399.4 155.0, 408.2 155.0, 416.9 155.0 C 425.6 155.0, 434.4 155.0, 443.1 155.0 C 451.8 155.0, 460.6 155.0, 469.3 155.0 C 478.0 155.0, 486.8 155.0, 495.5 155.0 C 504.3 155.0, 513.0 155.0, 521.7 155.0 C 530.5 155.0, 539.2 155.0, 547.9 155.0 C 556.7 155.0, 565.4 158.8, 574.1 155.0 C 582.9 151.2, 591.6 140.6, 600.3 132.5 C 609.1 124.4, 617.8 113.1, 626.6 106.2 C 635.3 99.4, 644.0 93.8, 652.8 91.2 C 661.5 88.8, 670.2 91.2, 679.0 91.2 C 687.7 91.2, 696.4 87.5, 705.2 91.2 C 713.9 95.0, 722.6 113.1, 731.4 113.8 C 740.1 114.4, 748.9 99.4, 757.6 95.0 C 766.3 90.6, 775.1 90.0, 783.8 87.5 C 792.5 85.0, 801.3 81.2, 810.0 80.0" fill="none" stroke="#ff007f" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.6" clip-path="url(#chartClip)"/>

  <!-- X-Axis Labels (Days timeline) -->
  <g font-family="'Courier New',Courier,monospace" font-size="8" fill="#64748b" text-anchor="middle">
    <text x="50"    y="172">30D AGO</text>
    <text x="176.6" y="172">WEEK 1</text>
    <text x="303.2" y="172">WEEK 2</text>
    <text x="430.0" y="172">WEEK 3</text>
    <text x="556.6" y="172">WEEK 4</text>
    <text x="683.2" y="172">WEEK 5</text>
    <text x="810"    y="172">TODAY</text>
  </g>

  <!-- Telemetry indicators at the bottom -->
  <g transform="translate(50, 190)" font-family="Arial,sans-serif" font-size="9" fill="#64748b">
    <rect x="0" y="-7" width="8" height="8" rx="2" fill="#00f0ff"/>
    <text x="14" y="1">Commits</text>
    
    <rect x="90" y="-7" width="8" height="8" rx="2" fill="#a855f7"/>
    <text x="104" y="1">Pull Requests</text>

    <rect x="195" y="-7" width="8" height="8" rx="2" fill="#ff007f"/>
    <text x="209" y="1">Reviews</text>

    <line x1="290" y1="-3" x2="305" y2="-3" stroke="#ff007f" stroke-width="1.5" stroke-dasharray="2 2"/>
    <text x="312" y="1">Trend Velocity</text>
    
    <!-- Real-time Run-Rate Indicator on the far right -->
    <text x="760" y="1" font-family="'Courier New',Courier,monospace" fill="#00f0ff" text-anchor="end" font-weight="bold">GOAL RATE: <tspan fill="#a855f7">92%</tspan></text>
  </g>

  <!-- Dynamic Data Point Markers (Generated by Script) -->
  <g id="dynamicPoints"></g>

  <!-- Floating HUD Peak marker -->
  <g id="peakHUD" transform="translate(716, 45)" opacity="0.95">
    <rect x="0" y="0" width="82" height="15" rx="3" fill="#1e1b4b" stroke="#ff007f" stroke-width="0.8"/>
    <text id="peakHUDText" x="41" y="10" font-family="'Courier New',Courier,monospace" font-size="7" font-weight="bold" fill="#ff007f" text-anchor="middle">PEAK: 12 ACT</text>
  </g>

</svg>
