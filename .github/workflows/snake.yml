name: Generate Snake

on:
  schedule:
    # Run once every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  # Run on every push to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # generates a game of snake from a github user contributions graph, output a svg animation at <summary_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00f0ff&color_dots=#161b22,#1d1c3a,#4f46e5,#a855f7,#ff007f
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00f0ff&color_dots=#070a13,#1d1c3a,#4f46e5,#a855f7,#ff007f

      # Generates a streak stats SVG image
      - name: Generate streak stats
        uses: be-next/github-streak-stats-action@v1
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          output-path: dist/profile-streak-stats.svg
          theme: tokyonight
          hide-border: true
          background: 070a13
          ring: 00f0ff
          fire: ff007f
          currStreakLabel: 00f0ff
          sideNums: e2e8f0
          sideLabels: 94a3b8

      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file>
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
