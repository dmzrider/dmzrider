name: Update Profile Stats SVGs

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-level: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Stats Updater Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_stats.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add activity-graph.svg diagnostics.svg activity-radar.svg
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes in SVG files detected."
          else
            git commit -m "auto(stats): update profile activity and diagnostics SVGs"
            git push origin main
          fi
