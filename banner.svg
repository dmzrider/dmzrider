<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 240" width="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070a13;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161233;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text Highlight Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff007f;stop-opacity:1" />
    </linearGradient>

    <!-- Grid / Wave Gradients -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ff007f;stop-opacity:0.03" />
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.2" />
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d946ef;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Keyframe Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }
    @keyframes float-delayed {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(8px) rotate(-3deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.45; }
    }
    @keyframes wave-move-1 {
      0% { transform: translateX(0px) scaleY(1); }
      50% { transform: translateX(-35px) scaleY(1.05); }
      100% { transform: translateX(0px) scaleY(1); }
    }
    @keyframes wave-move-2 {
      0% { transform: translateX(0px) scaleY(1); }
      50% { transform: translateX(25px) scaleY(0.95); }
      100% { transform: translateX(0px) scaleY(1); }
    }
    @keyframes scanline {
      0% { transform: translateY(-240px); }
      100% { transform: translateY(240px); }
    }
    @keyframes hue-shift {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    
    /* Animation Classes */
    .floating-node-1 {
      animation: float 6s infinite ease-in-out;
      transform-origin: 700px 90px;
    }
    .floating-node-2 {
      animation: float-delayed 8s infinite ease-in-out;
      transform-origin: 750px 150px;
    }
    .pulse-glow {
      animation: pulse 3s infinite ease-in-out;
    }
    .wave-1 {
      animation: wave-move-1 12s infinite ease-in-out;
      transform-origin: bottom center;
    }
    .wave-2 {
      animation: wave-move-2 18s infinite ease-in-out;
      transform-origin: bottom center;
    }
    .scanner {
      animation: scanline 8s infinite linear;
      opacity: 0.05;
    }
    .hue-cycle {
      animation: hue-shift 20s infinite linear;
    }
    .dash-flow {
      stroke-dasharray: 8 4;
      animation: dash 5s linear infinite;
    }
  </style>

  <!-- Background Card -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />
  
  <!-- Cyber Grid Background -->
  <g stroke="url(#gridGrad)" stroke-width="1">
    <!-- Horizontal Grid Lines -->
    <line x1="0" y1="30" x2="850" y2="30" />
    <line x1="0" y1="60" x2="850" y2="60" />
    <line x1="0" y1="90" x2="850" y2="90" />
    <line x1="0" y1="120" x2="850" y2="120" />
    <line x1="0" y1="150" x2="850" y2="150" />
    <line x1="0" y1="180" x2="850" y2="180" />
    <line x1="0" y1="210" x2="850" y2="210" />
    <!-- Vertical Grid Lines -->
    <line x1="85" y1="0" x2="85" y2="240" />
    <line x1="170" y1="0" x2="170" y2="240" />
    <line x1="255" y1="0" x2="255" y2="240" />
    <line x1="340" y1="0" x2="340" y2="240" />
    <line x1="425" y1="0" x2="425" y2="240" />
    <line x1="510" y1="0" x2="510" y2="240" />
    <line x1="595" y1="0" x2="595" y2="240" />
    <line x1="680" y1="0" x2="680" y2="240" />
    <line x1="765" y1="0" x2="765" y2="240" />
  </g>

  <!-- Scanning Laser Bar -->
  <rect class="scanner" width="100%" height="2" fill="#00f0ff" />

  <!-- Animated Glowing Cyber Waves at the bottom -->
  <path class="wave-1" d="M 0 160 C 180 120, 320 220, 520 150 C 680 90, 740 180, 850 120 L 850 240 L 0 240 Z" fill="url(#waveGrad1)" />
  <path class="wave-2" d="M 0 185 C 150 150, 260 200, 460 170 C 640 130, 680 175, 850 145 L 850 240 L 0 240 Z" fill="url(#waveGrad2)" />

  <!-- Decorative HUD details & Tech Shapes -->
  <!-- Floating Tech Node 1 (Brackets) -->
  <g class="floating-node-1" transform="translate(670, 50)">
    <g stroke="url(#textGrad)" stroke-width="2.5" fill="none">
      <!-- Brackets < /> -->
      <path d="M 15 15 L 0 30 L 15 45" />
      <path d="M 23 10 L 15 50" />
      <path d="M 27 15 L 42 30 L 27 45" />
    </g>
    <circle cx="21" cy="30" r="28" stroke="#a855f7" stroke-width="1" stroke-dasharray="4 4" fill="none" opacity="0.4" />
  </g>

  <!-- Floating Tech Node 2 (Reticle/Crosshair) -->
  <g class="floating-node-2" transform="translate(750, 130)">
    <circle cx="0" cy="0" r="16" stroke="#ff007f" stroke-width="1.5" fill="none" class="dash-flow" />
    <circle cx="0" cy="0" r="4" fill="#ff007f" opacity="0.8" />
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#ff007f" stroke-width="0.75" stroke-dasharray="2 2" />
    <line x1="0" y1="-24" x2="0" y2="24" stroke="#ff007f" stroke-width="0.75" stroke-dasharray="2 2" />
  </g>

  <!-- Telemetry text display (top right) -->
  <g transform="translate(710, 25)" fill="#6366f1" font-family="Courier New, monospace" font-size="9" font-weight="bold" opacity="0.6">
    <text x="0" y="0">SYS.STATUS: ACTIVE</text>
    <text x="0" y="12">SEC.LEVEL: HIGH</text>
    <text x="0" y="24">PORT: 8080//SEC</text>
  </g>

  <!-- Futuristic Corner Framing -->
  <g stroke="#00f0ff" stroke-width="2.5" fill="none" opacity="0.75">
    <!-- Top-left -->
    <path d="M 20 40 L 20 20 L 40 20" />
    <!-- Bottom-left -->
    <path d="M 20 200 L 20 220 L 40 220" />
    <!-- Top-right -->
    <path d="M 830 40 L 830 20 L 810 20" />
    <!-- Bottom-right -->
    <path d="M 830 200 L 830 220 L 810 220" />
  </g>

  <!-- Typography Content -->
  <g transform="translate(55, 80)">
    <!-- Subtitle Tech Grid Prefix -->
    <text x="0" y="-10" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#00f0ff" letter-spacing="3" opacity="0.9">/** AUTHORIZED PROFILE **/</text>
    
    <!-- Title Name (with Glowing filter and gradient) -->
    <text class="hue-cycle" x="0" y="42" font-family="'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="3">MANU</text>
    
    <!-- Tagline Roles -->
    <text x="0" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9" letter-spacing="0.5">Discord Bot Developer &amp; Systems Architect</text>
    
    <!-- Secondary Tags / Details -->
    <text x="0" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1">🚀 SA-MP PAWN SCRIPTING • SECURITY TRIGGERS &amp; DDOS ALERTS</text>
    
    <!-- Location Badge -->
    <g transform="translate(0, 114)">
      <rect x="0" y="0" width="130" height="20" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" />
      <circle cx="12" cy="10" r="4" fill="#00f0ff" class="pulse-glow" filter="url(#subtleGlow)" />
      <text x="24" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="800" fill="#e2e8f0" letter-spacing="1.5">📍 KERALA, INDIA</text>
    </g>
  </g>
</svg>
