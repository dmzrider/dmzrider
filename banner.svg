<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="100%">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#070a13"/>
      <stop offset="50%"  style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#13102e"/>
    </linearGradient>

    <!-- Name gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00f0ff"/>
      <stop offset="50%"  style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ff007f"/>
    </linearGradient>

    <!-- Wave gradients -->
    <linearGradient id="waveA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#4f46e5;stop-opacity:0.3"/>
      <stop offset="50%"  style="stop-color:#06b6d4;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#d946ef;stop-opacity:0.15"/>
      <stop offset="50%"  style="stop-color:#8b5cf6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.1"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ─── Background ─────────────────────────────────── -->
  <rect width="850" height="220" fill="url(#bgGrad)" rx="14"/>

  <!-- ─── Grid lines ─────────────────────────────────── -->
  <g stroke="#a855f7" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="28"  x2="850" y2="28"/>
    <line x1="0" y1="56"  x2="850" y2="56"/>
    <line x1="0" y1="84"  x2="850" y2="84"/>
    <line x1="0" y1="112" x2="850" y2="112"/>
    <line x1="0" y1="140" x2="850" y2="140"/>
    <line x1="0" y1="168" x2="850" y2="168"/>
    <line x1="0" y1="196" x2="850" y2="196"/>
    <line x1="106" y1="0" x2="106" y2="220"/>
    <line x1="212" y1="0" x2="212" y2="220"/>
    <line x1="318" y1="0" x2="318" y2="220"/>
    <line x1="424" y1="0" x2="424" y2="220"/>
    <line x1="530" y1="0" x2="530" y2="220"/>
    <line x1="636" y1="0" x2="636" y2="220"/>
    <line x1="742" y1="0" x2="742" y2="220"/>
  </g>

  <!-- ─── Scanner bar (SVG animateTransform — reliable) ─ -->
  <rect x="0" y="-2" width="850" height="2" fill="#00f0ff" opacity="0.05">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,224" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- ─── WAVES (start at y=170 — well below all text) ── -->
  <path d="M0 172 C160 145,310 200,510 168 C670 140,730 185,850 158 L850 220 L0 220 Z" fill="url(#waveA)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-30,0;0,0" dur="14s" repeatCount="indefinite"/>
  </path>
  <path d="M0 188 C140 165,240 208,440 182 C630 158,690 198,850 175 L850 220 L0 220 Z" fill="url(#waveB)">
    <animateTransform attributeName="transform" type="translate" values="0,0;20,0;0,0" dur="20s" repeatCount="indefinite"/>
  </path>

  <!-- ─── Corner brackets ─────────────────────────────── -->
  <g stroke="#00f0ff" stroke-width="2.2" fill="none" opacity="0.75">
    <!-- top-left -->
    <path d="M20 42 L20 20 L42 20"/>
    <!-- bottom-left -->
    <path d="M20 178 L20 200 L42 200"/>
    <!-- top-right -->
    <path d="M830 42 L830 20 L808 20"/>
    <!-- bottom-right -->
    <path d="M830 178 L830 200 L808 200"/>
  </g>

  <!-- ─── RIGHT ZONE — decorative elements (x≥620) ─────── -->

  <!-- HUD telemetry — top right -->
  <g transform="translate(672,22)" fill="#4f6ef7" font-family="'Courier New',Courier,monospace" font-size="8.5" font-weight="bold" opacity="0.7">
    <text x="0" y="0">SYS.STATUS : ACTIVE</text>
    <text x="0" y="13">SEC.LEVEL  : HIGH</text>
    <text x="0" y="26">PORT       : 8080//SEC</text>
  </g>

  <!-- Code bracket icon — floating right, DOES NOT overlap text zone -->
  <g transform="translate(648,68)">
    <!-- Orbiting dashed ring -->
    <circle cx="22" cy="28" r="32" stroke="#a855f7" stroke-width="1" fill="none" opacity="0.35">
      <animate attributeName="stroke-dasharray" values="4 4;8 4;4 4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- </> symbol -->
    <g stroke="url(#nameGrad)" stroke-width="2.8" fill="none">
      <path d="M12 14 L0 28 L12 42"/>
      <path d="M18 9 L10 47"/>
      <path d="M26 14 L38 28 L26 42"/>
    </g>
    <!-- Float animation -->
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0;0,-7;0,0" dur="6s" repeatCount="indefinite"/>
  </g>

  <!-- Reticle — lower right -->
  <g transform="translate(800,145)">
    <circle cx="0" cy="0" r="17" stroke="#ff007f" stroke-width="1.5" fill="none">
      <animate attributeName="stroke-dasharray" values="8 4;4 8;8 4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#ff007f" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#ff007f" stroke-width="0.8" stroke-dasharray="2 2"/>
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#ff007f" stroke-width="0.8" stroke-dasharray="2 2"/>
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0;0,7;0,0" dur="9s" repeatCount="indefinite"/>
  </g>

  <!-- ─── LEFT ZONE — all text (x: 52–600, y: 22–165) ─── -->
  <g transform="translate(52,22)">

    <!-- Mono header -->
    <text x="0" y="18"
          font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="bold" letter-spacing="3.5"
          fill="#00f0ff" opacity="0.9">/** AUTHORIZED PROFILE **/</text>

    <!-- Name "MANU" -->
    <text x="0" y="78"
          font-family="'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="58" font-weight="900" letter-spacing="5"
          fill="url(#nameGrad)" filter="url(#glow)">MANU</text>

    <!-- Tagline -->
    <text x="0" y="108"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="16.5" font-weight="700" letter-spacing="0.2"
          fill="#f1f5f9">Discord Bot Developer &amp; Systems Architect</text>

    <!-- Sub-tags -->
    <text x="0" y="128"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="11.5" font-weight="600" letter-spacing="1.1"
          fill="#94a3b8">🚀 SA-MP PAWN SCRIPTING  •  SECURITY TRIGGERS &amp; DDOS ALERTS</text>

    <!-- Location badge -->
    <g transform="translate(0,140)">
      <rect x="0" y="0" width="142" height="22" rx="11"
            fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
      <!-- Pulsing dot -->
      <circle cx="14" cy="11" r="4" fill="#00f0ff" filter="url(#softGlow)">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="27" y="15.5"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="10" font-weight="800" letter-spacing="1.5"
            fill="#e2e8f0">📍 KERALA, INDIA</text>
    </g>

  </g>

</svg>
