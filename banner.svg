<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070a13;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161233;stop-opacity:1" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff007f;stop-opacity:1" />
    </linearGradient>

    <!-- Grid Gradient -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.02" />
      <stop offset="60%" style="stop-color:#a855f7;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#ff007f;stop-opacity:0.02" />
    </linearGradient>

    <!-- Wave Gradients -->
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.25" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.25" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d946ef;stop-opacity:0.12" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.08" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes wave-move-1 {
      0%   { transform: translateX(0px) scaleY(1); }
      50%  { transform: translateX(-30px) scaleY(1.04); }
      100% { transform: translateX(0px) scaleY(1); }
    }
    @keyframes wave-move-2 {
      0%   { transform: translateX(0px) scaleY(1); }
      50%  { transform: translateX(22px) scaleY(0.96); }
      100% { transform: translateX(0px) scaleY(1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(-7px) rotate(3deg); }
    }
    @keyframes float-r {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(7px) rotate(-3deg); }
    }
    @keyframes scanline {
      0%   { transform: translateY(-260px); }
      100% { transform: translateY(260px); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.2; r: 3; }
      50%       { opacity: 1;   r: 5; }
    }
    @keyframes hue-shift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    @keyframes dash-spin {
      to { stroke-dashoffset: -40; }
    }

    .wave-1 { animation: wave-move-1 14s infinite ease-in-out; transform-origin: 425px 260px; }
    .wave-2 { animation: wave-move-2 20s infinite ease-in-out; transform-origin: 425px 260px; }
    .node-1 { animation: float 6s infinite ease-in-out; }
    .node-2 { animation: float-r 9s infinite ease-in-out; }
    .scanner { animation: scanline 9s infinite linear; opacity: 0.04; }
    .name-hue { animation: hue-shift 18s infinite linear; }
    .dash-spin { stroke-dasharray: 8 4; animation: dash-spin 5s linear infinite; }
    .pulse-dot { animation: pulse-dot 2s infinite ease-in-out; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="14" />

  <!-- Subtle grid -->
  <g stroke="url(#gridGrad)" stroke-width="0.8">
    <line x1="0" y1="32" x2="850" y2="32"/>
    <line x1="0" y1="64" x2="850" y2="64"/>
    <line x1="0" y1="96" x2="850" y2="96"/>
    <line x1="0" y1="128" x2="850" y2="128"/>
    <line x1="0" y1="160" x2="850" y2="160"/>
    <line x1="0" y1="192" x2="850" y2="192"/>
    <line x1="0" y1="224" x2="850" y2="224"/>
    <line x1="85"  y1="0" x2="85"  y2="260"/>
    <line x1="170" y1="0" x2="170" y2="260"/>
    <line x1="255" y1="0" x2="255" y2="260"/>
    <line x1="340" y1="0" x2="340" y2="260"/>
    <line x1="425" y1="0" x2="425" y2="260"/>
    <line x1="510" y1="0" x2="510" y2="260"/>
    <line x1="595" y1="0" x2="595" y2="260"/>
    <line x1="680" y1="0" x2="680" y2="260"/>
    <line x1="765" y1="0" x2="765" y2="260"/>
  </g>

  <!-- Scanner bar -->
  <rect class="scanner" x="0" y="0" width="100%" height="2" fill="#00f0ff"/>

  <!-- ═══ WAVES — placed BELOW all text (start at y≥205) ═══ -->
  <path class="wave-1"
        d="M 0 205 C 160 170, 300 230, 500 195 C 660 165, 730 210, 850 175 L 850 260 L 0 260 Z"
        fill="url(#waveGrad1)" />
  <path class="wave-2"
        d="M 0 222 C 140 195, 240 235, 440 210 C 630 185, 680 222, 850 195 L 850 260 L 0 260 Z"
        fill="url(#waveGrad2)" />

  <!-- ═══ Floating code bracket node (top-right) ═══ -->
  <g class="node-1" transform="translate(665,42)">
    <circle cx="21" cy="30" r="30" stroke="#a855f7" stroke-width="1" stroke-dasharray="4 4" fill="none" opacity="0.35"/>
    <g stroke="url(#textGrad)" stroke-width="2.5" fill="none">
      <path d="M15 15 L0 30 L15 45"/>
      <path d="M22 10 L14 50"/>
      <path d="M28 15 L43 30 L28 45"/>
    </g>
  </g>

  <!-- ═══ Floating reticle node ═══ -->
  <g class="node-2" transform="translate(740,130)">
    <circle cx="0" cy="0" r="16" stroke="#ff007f" stroke-width="1.5" fill="none" class="dash-spin"/>
    <circle cx="0" cy="0" r="4" fill="#ff007f" opacity="0.85"/>
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#ff007f" stroke-width="0.7" stroke-dasharray="2 2"/>
    <line x1="0" y1="-24" x2="0" y2="24" stroke="#ff007f" stroke-width="0.7" stroke-dasharray="2 2"/>
  </g>

  <!-- ═══ HUD telemetry (top-right, above bracket node) ═══ -->
  <g transform="translate(716,18)" fill="#4f46e5" font-family="'Courier New',Courier,monospace" font-size="8.5" font-weight="bold" opacity="0.65">
    <text x="0" y="0">SYS.STATUS: ACTIVE</text>
    <text x="0" y="12">SEC.LEVEL:  HIGH</text>
    <text x="0" y="24">PORT: 8080//SEC</text>
  </g>

  <!-- ═══ Corner frame brackets ═══ -->
  <g stroke="#00f0ff" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M22 44 L22 22 L44 22"/>
    <path d="M22 216 L22 238 L44 238"/>
    <path d="M828 44 L828 22 L806 22"/>
    <path d="M828 216 L828 238 L806 238"/>
  </g>

  <!-- ═══ Typography — all text safely in top zone (y 30–200) ═══ -->
  <g transform="translate(56,36)">

    <!-- Mono prefix -->
    <text x="0" y="0"
          font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="bold"
          fill="#00f0ff" letter-spacing="3" opacity="0.9">/** AUTHORIZED PROFILE **/</text>

    <!-- Name -->
    <text class="name-hue" x="0" y="58"
          font-family="'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="56" font-weight="900"
          fill="url(#textGrad)" filter="url(#glow)" letter-spacing="4">MANU</text>

    <!-- Tagline -->
    <text x="0" y="94"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="17" font-weight="700"
          fill="#f1f5f9" letter-spacing="0.3">Discord Bot Developer &amp; Systems Architect</text>

    <!-- Secondary tags -->
    <text x="0" y="116"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="12" font-weight="600"
          fill="#94a3b8" letter-spacing="1.2">🚀 SA-MP PAWN SCRIPTING  •  SECURITY TRIGGERS &amp; DDOS ALERTS</text>

    <!-- Location badge -->
    <g transform="translate(0,128)">
      <rect x="0" y="0" width="138" height="22" rx="11" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
      <circle class="pulse-dot" cx="14" cy="11" r="4" fill="#00f0ff" filter="url(#softGlow)"/>
      <text x="26" y="15.5"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="10" font-weight="800"
            fill="#e2e8f0" letter-spacing="1.5">📍 KERALA, INDIA</text>
    </g>

  </g>
</svg>
