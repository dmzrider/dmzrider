<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%">
  <defs>

    <!-- Deep space background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#04060f"/>
      <stop offset="55%"  stop-color="#080e1c"/>
      <stop offset="100%" stop-color="#0e0a24"/>
    </linearGradient>

    <!-- Animated name gradient (colors shift over time) -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff">
        <animate attributeName="stop-color"
          values="#00f0ff;#a855f7;#ff007f;#a855f7;#00f0ff"
          dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a855f7">
        <animate attributeName="stop-color"
          values="#a855f7;#ff007f;#00f0ff;#ff007f;#a855f7"
          dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff007f">
        <animate attributeName="stop-color"
          values="#ff007f;#00f0ff;#a855f7;#00f0ff;#ff007f"
          dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Separator line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0"/>
    </linearGradient>

    <!-- Wave fills -->
    <linearGradient id="waveA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d946ef" stop-opacity="0.14"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ━━━ LAYER 0: Background ━━━ -->
  <rect width="850" height="200" fill="url(#bg)" rx="13"/>

  <!-- ━━━ LAYER 1: Subtle grid ━━━ -->
  <g stroke="#3730a3" stroke-width="0.5" opacity="0.08">
    <line x1="0"   y1="40"  x2="850" y2="40"/>
    <line x1="0"   y1="80"  x2="850" y2="80"/>
    <line x1="0"   y1="120" x2="850" y2="120"/>
    <line x1="0"   y1="160" x2="850" y2="160"/>
    <line x1="106" y1="0"   x2="106" y2="200"/>
    <line x1="212" y1="0"   x2="212" y2="200"/>
    <line x1="318" y1="0"   x2="318" y2="200"/>
    <line x1="424" y1="0"   x2="424" y2="200"/>
    <line x1="530" y1="0"   x2="530" y2="200"/>
    <line x1="636" y1="0"   x2="636" y2="200"/>
    <line x1="742" y1="0"   x2="742" y2="200"/>
  </g>

  <!-- ━━━ LAYER 2: Animated scan bar (behind all content) ━━━ -->
  <rect x="0" y="-2" width="850" height="1.5" fill="#00f0ff" opacity="0.05">
    <animateTransform attributeName="transform" type="translate"
      from="0,0" to="0,204" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- ━━━ LAYER 3: Waves — anchored to very bottom (y ≥ 175) ━━━ -->
  <path d="M0 176 C140 155,280 192,470 168 C640 146,730 176,850 158 L850 200 L0 200Z"
        fill="url(#waveA)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;-28,0;0,0" dur="13s" repeatCount="indefinite"/>
  </path>
  <path d="M0 187 C120 170,230 198,430 178 C610 158,700 190,850 172 L850 200 L0 200Z"
        fill="url(#waveB)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;20,0;0,0" dur="19s" repeatCount="indefinite"/>
  </path>

  <!-- ━━━ LAYER 4: LEFT TEXT ZONE (x:50–530, y:15–172) ━━━ -->

  <!-- Mono prefix -->
  <text x="50" y="30"
    font-family="'Courier New',Courier,monospace"
    font-size="10" font-weight="bold" letter-spacing="3.5"
    fill="#00f0ff" opacity="0.8">/** AUTHORIZED PROFILE **/</text>

  <!-- Big name with animated gradient + glow -->
  <text x="50" y="92"
    font-family="Arial Black,Impact,Arial,sans-serif"
    font-size="64" font-weight="900" letter-spacing="7"
    fill="url(#nameGrad)" filter="url(#glow)">MANU</text>

  <!-- Glowing separator line under name -->
  <rect x="50" y="99" width="295" height="1.5" fill="url(#lineGrad)"/>

  <!-- Tagline -->
  <text x="50" y="120"
    font-family="Arial,sans-serif"
    font-size="15" font-weight="700"
    fill="#f1f5f9">Discord Bot Developer &amp; Systems Architect</text>

  <!-- Sub-tags -->
  <text x="50" y="139"
    font-family="Arial,sans-serif"
    font-size="10.5" font-weight="600" letter-spacing="1.1"
    fill="#94a3b8">🚀 SA-MP PAWN  •  SECURITY TRIGGERS  •  DDOS ALERTS</text>

  <!-- Location badge — bottom of left zone (y:148–170, clear of waves at y=176) -->
  <rect x="50" y="150" width="148" height="22" rx="11"
    fill="#0f172a" stroke="#6366f1" stroke-width="1.2"/>
  <!-- Pulsing cyan dot -->
  <circle cx="66" cy="161" r="4" fill="#00f0ff" filter="url(#dot-glow)">
    <animate attributeName="r"       values="3;5;3"     dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="79" y="165.5"
    font-family="Arial,sans-serif"
    font-size="10" font-weight="800" letter-spacing="1.5"
    fill="#e2e8f0">📍 KERALA, INDIA</text>

  <!-- ━━━ LAYER 5: RIGHT TERMINAL CARD (x:555–828, y:12–172) ━━━ -->

  <!-- Card shadow / glow backing -->
  <rect x="553" y="10" width="278" height="163" rx="11"
    fill="#00f0ff" opacity="0.03" filter="url(#glow)"/>

  <!-- Card body -->
  <rect x="556" y="13" width="272" height="160" rx="10"
    fill="#060c1c" stroke="#1c2a4a" stroke-width="1.2"/>

  <!-- Animated glowing border overlay -->
  <rect x="556" y="13" width="272" height="160" rx="10"
    fill="none" stroke="#4f46e5" stroke-width="1.5">
    <animate attributeName="opacity"  values="0.25;0.75;0.25" dur="3s"  repeatCount="indefinite"/>
    <animate attributeName="stroke"   values="#4f46e5;#00f0ff;#a855f7;#ff007f;#4f46e5" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Title bar -->
  <rect x="556" y="13" width="272" height="26" rx="10" fill="#0b1526"/>
  <rect x="556" y="26" width="272" height="13" fill="#0b1526"/>

  <!-- macOS-style traffic-light dots -->
  <circle cx="575" cy="26" r="4.5" fill="#ff5f57"/>
  <circle cx="592" cy="26" r="4.5" fill="#febc2e"/>
  <circle cx="609" cy="26" r="4.5" fill="#28c840"/>

  <!-- Bar title -->
  <text x="692" y="31" text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="9" fill="#64748b">bash — dmzrider</text>

  <!-- ── Terminal content ── -->
  <g font-family="'Courier New',Courier,monospace">

    <!-- Row 1: command prompt -->
    <text x="570" y="60" font-size="11">
      <tspan fill="#6366f1">dmzrider</tspan>
      <tspan fill="#64748b">@github</tspan>
      <tspan fill="#f1f5f9">:</tspan>
      <tspan fill="#00f0ff">~</tspan>
      <tspan fill="#f1f5f9">$ </tspan>
      <tspan fill="#94a3b8">cat profile</tspan>
    </text>

    <!-- Row 2 -->
    <text x="570" y="80" font-size="11">
      <tspan fill="#4ade80" dx="0">›</tspan>
      <tspan fill="#64748b" dx="4">name     </tspan>
      <tspan fill="#e2e8f0">= </tspan>
      <tspan fill="#00f0ff" font-weight="bold">Manu</tspan>
    </text>

    <!-- Row 3 -->
    <text x="570" y="98" font-size="11">
      <tspan fill="#4ade80">›</tspan>
      <tspan fill="#64748b" dx="4">status   </tspan>
      <tspan fill="#e2e8f0">= </tspan>
      <tspan fill="#4ade80" font-weight="bold">● Online</tspan>
    </text>

    <!-- Row 4 -->
    <text x="570" y="116" font-size="11">
      <tspan fill="#4ade80">›</tspan>
      <tspan fill="#64748b" dx="4">role     </tspan>
      <tspan fill="#e2e8f0">= </tspan>
      <tspan fill="#a855f7" font-weight="bold">Dev / Security</tspan>
    </text>

    <!-- Row 5 -->
    <text x="570" y="134" font-size="11">
      <tspan fill="#4ade80">›</tspan>
      <tspan fill="#64748b" dx="4">location </tspan>
      <tspan fill="#e2e8f0">= </tspan>
      <tspan fill="#ff007f" font-weight="bold">Kerala, India</tspan>
    </text>

    <!-- Row 6 -->
    <text x="570" y="152" font-size="11">
      <tspan fill="#4ade80">›</tspan>
      <tspan fill="#64748b" dx="4">work     </tspan>
      <tspan fill="#e2e8f0">= </tspan>
      <tspan fill="#fbbf24" font-weight="bold">Building 24/7 🚀</tspan>
    </text>

    <!-- Row 7: new prompt + blinking cursor -->
    <text x="570" y="170" font-size="11">
      <tspan fill="#6366f1">dmzrider</tspan>
      <tspan fill="#64748b">@github</tspan>
      <tspan fill="#f1f5f9">:</tspan>
      <tspan fill="#00f0ff">~</tspan>
      <tspan fill="#f1f5f9">$ </tspan>
    </text>
    <!-- Blinking block cursor -->
    <rect x="627" y="158" width="7" height="13" fill="#00f0ff" rx="1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

  </g>

  <!-- ━━━ LAYER 6: Corner L-brackets ━━━ -->
  <g stroke="#00f0ff" stroke-width="2.2" fill="none" opacity="0.55">
    <path d="M18 40 L18 18 L40 18"/>
    <path d="M18 162 L18 182 L40 182"/>
    <path d="M832 40 L832 18 L810 18"/>
    <path d="M832 162 L832 182 L810 182"/>
  </g>

</svg>
