<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="100%">
  <defs>
    <linearGradient id="radarbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="radarFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00f0ff" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="cardLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <filter id="rGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer card -->
  <rect width="860" height="320" rx="14" fill="url(#radarbg)" stroke="#1a2540" stroke-width="1.2"/>
  <!-- Animated border -->
  <rect width="860" height="320" rx="14" fill="none" stroke="#4f46e5" stroke-width="1.5">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#4f46e5;#00f0ff;#a855f7;#ff007f;#4f46e5" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e2d52" stroke-width="0.6" opacity="0.5">
    <line x1="430" y1="0" x2="430" y2="320"/>
    <line x1="0"   y1="160" x2="860" y2="160"/>
  </g>

  <!-- ═══ LEFT PANEL: Activity Info ═══ -->
  <rect x="12" y="12" width="400" height="296" rx="10" fill="url(#cardLeft)" stroke="#1e2d52" stroke-width="1"/>

  <!-- Panel header -->
  <text x="32" y="46" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="bold" letter-spacing="2" fill="#00f0ff" opacity="0.85">// ACTIVITY_OVERVIEW</text>
  <line x1="32" y1="52" x2="398" y2="52" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Stat rows -->
  <!-- Row 1: Commits -->
  <g transform="translate(32, 78)">
    <rect x="0" y="-16" width="8" height="20" rx="2" fill="#00f0ff">
      <animate attributeName="height" values="20;28;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-16;-20;-16" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="0"  font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Commits</text>
    <text x="20" y="14" font-family="'Courier New',Courier,monospace" font-size="10" fill="#64748b">Primary contribution type</text>
    <!-- Bar -->
    <rect x="0" y="24" width="350" height="6" rx="3" fill="#1e2d52"/>
    <rect x="0" y="24" width="0" height="6" rx="3" fill="#00f0ff">
      <animate attributeName="width" values="0;245;245" dur="1.5s" fill="freeze" begin="0.2s"/>
    </rect>
    <text x="352" y="31" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00f0ff" text-anchor="end">54%</text>
  </g>

  <!-- Row 2: Code Review -->
  <g transform="translate(32, 148)">
    <rect x="0" y="-16" width="8" height="20" rx="2" fill="#a855f7">
      <animate attributeName="height" values="20;28;20" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-16;-20;-16" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="0"  font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Code Review</text>
    <text x="20" y="14" font-family="'Courier New',Courier,monospace" font-size="10" fill="#64748b">Reviewed &amp; merged PRs</text>
    <rect x="0" y="24" width="350" height="6" rx="3" fill="#1e2d52"/>
    <rect x="0" y="24" width="0" height="6" rx="3" fill="#a855f7">
      <animate attributeName="width" values="0;126;126" dur="1.5s" fill="freeze" begin="0.4s"/>
    </rect>
    <text x="352" y="31" font-family="'Courier New',Courier,monospace" font-size="9" fill="#a855f7" text-anchor="end">27%</text>
  </g>

  <!-- Row 3: Pull Requests -->
  <g transform="translate(32, 218)">
    <rect x="0" y="-16" width="8" height="20" rx="2" fill="#ff007f">
      <animate attributeName="height" values="20;28;20" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-16;-20;-16" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="0"  font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Pull Requests</text>
    <text x="20" y="14" font-family="'Courier New',Courier,monospace" font-size="10" fill="#64748b">Opened &amp; merged into repos</text>
    <rect x="0" y="24" width="350" height="6" rx="3" fill="#1e2d52"/>
    <rect x="0" y="24" width="0" height="6" rx="3" fill="#ff007f">
      <animate attributeName="width" values="0;88;88" dur="1.5s" fill="freeze" begin="0.6s"/>
    </rect>
    <text x="352" y="31" font-family="'Courier New',Courier,monospace" font-size="9" fill="#ff007f" text-anchor="end">19%</text>
  </g>

  <!-- Row 4: Issues -->
  <g transform="translate(32, 288)">
    <rect x="0" y="-16" width="8" height="20" rx="2" fill="#fbbf24">
      <animate attributeName="height" values="20;28;20" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-16;-20;-16" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="0"  font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Issues Opened</text>
    <text x="20" y="14" font-family="'Courier New',Courier,monospace" font-size="10" fill="#64748b">Bug reports &amp; feature requests</text>
    <rect x="0" y="24" width="350" height="6" rx="3" fill="#1e2d52"/>
    <rect x="0" y="24" width="0" height="6" rx="3" fill="#fbbf24">
      <animate attributeName="width" values="0;70;70" dur="1.5s" fill="freeze" begin="0.8s"/>
    </rect>
    <text x="352" y="31" font-family="'Courier New',Courier,monospace" font-size="9" fill="#fbbf24" text-anchor="end">15%</text>
  </g>

  <!-- ═══ RIGHT PANEL: Radar Chart ═══ -->
  <!-- Background rings (5 levels) -->
  <g fill="none" stroke="#1e2d52" stroke-width="1" opacity="0.8">
    <polygon points="645,72 721,116 721,204 645,248 569,204 569,116" />
    <polygon points="645,88 713,124 713,196 645,232 577,196 577,124" />
    <polygon points="645,104 705,132 705,188 645,216 585,188 585,132" />
    <polygon points="645,120 697,140 697,180 645,200 593,180 593,140" />
    <polygon points="645,136 689,148 689,172 645,184 601,172 601,148" />
  </g>

  <!-- Axis lines from center -->
  <g stroke="#1e2d52" stroke-width="1" opacity="0.6">
    <line x1="645" y1="160" x2="645" y2="50"/>   <!-- up: Code Review -->
    <line x1="645" y1="160" x2="735" y2="110"/>  <!-- up-right: Issues -->
    <line x1="645" y1="160" x2="735" y2="210"/>  <!-- down-right: PRs -->
    <line x1="645" y1="160" x2="645" y2="270"/>  <!-- down: spare -->
    <line x1="645" y1="160" x2="555" y2="210"/>  <!-- down-left: Commits -->
    <line x1="645" y1="160" x2="555" y2="110"/>  <!-- up-left: spare -->
  </g>

  <!-- Data polygon (Commits=54%, CodeReview=27%, Issues=15%, PRs=19%) -->
  <polygon
    points="645,130 661,160 645,181 586,160"
    fill="url(#radarFill)" stroke="none" opacity="0.85"/>
  <polygon
    points="645,130 661,160 645,181 586,160"
    fill="none" stroke="#00f0ff" stroke-width="2" opacity="1"/>

  <!-- Axis endpoint dots -->
  <circle cx="645" cy="50" r="5" fill="#a855f7" filter="url(#rGlow)"/>
  <circle cx="735" cy="160" r="5" fill="#fbbf24" filter="url(#rGlow)"/>
  <circle cx="645" cy="270" r="5" fill="#ff007f" filter="url(#rGlow)"/>
  <circle cx="555" cy="160" r="5" fill="#00f0ff" filter="url(#rGlow)"/>

  <!-- Data point dots on polygon -->
  <circle cx="645" cy="130" r="5" fill="#a855f7" filter="url(#rGlow)"/>
  <circle cx="661" cy="160" r="5" fill="#fbbf24" filter="url(#rGlow)"/>
  <circle cx="645" cy="181" r="5" fill="#ff007f" filter="url(#rGlow)"/>
  <circle cx="586" cy="160" r="5" fill="#00f0ff" filter="url(#rGlow)"/>

  <!-- Axis labels -->
  <g font-family="'Courier New',Courier,monospace" text-anchor="middle">
    <!-- Top: Code Review -->
    <text x="645" y="38" font-size="10" font-weight="bold" fill="#a855f7">27%</text>
    <text x="645" y="26" font-size="9" fill="#64748b">Code Review</text>
    <!-- Right: Issues -->
    <text x="758" y="156" font-size="10" font-weight="bold" fill="#fbbf24" text-anchor="start">15%</text>
    <text x="758" y="168" font-size="9" fill="#64748b" text-anchor="start">Issues</text>
    <!-- Bottom: Pull Requests -->
    <text x="645" y="288" font-size="10" font-weight="bold" fill="#ff007f">19%</text>
    <text x="645" y="300" font-size="9" fill="#64748b">Pull Requests</text>
    <!-- Left: Commits -->
    <text x="532" y="156" font-size="10" font-weight="bold" fill="#00f0ff" text-anchor="end">54%</text>
    <text x="532" y="168" font-size="9" fill="#64748b" text-anchor="end">Commits</text>
  </g>

  <!-- Center label -->
  <text x="645" y="155" font-family="'Courier New',Courier,monospace" font-size="9" text-anchor="middle" fill="#64748b">dmzrider</text>
  <text x="645" y="168" font-family="'Courier New',Courier,monospace" font-size="8" text-anchor="middle" fill="#4a5568">activity</text>

  <!-- Pulsing center dot -->
  <circle cx="645" cy="160" r="4" fill="#00f0ff" filter="url(#rGlow)">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>

</svg>
